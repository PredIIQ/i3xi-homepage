<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>I3XI LLC</title>

  <link rel="icon" type="image/png" href="favicon.png" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #020202;
      color: white;
    }

    .page {
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      background: #020202;
    }

    .nav {
      position: absolute;
      top: 35px;
      right: 50px;
      z-index: 10;
      display: flex;
      gap: 28px;
    }

    .nav a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: 0.3s ease;
    }

    .nav a:hover {
      color: #c9a46a;
    }

    .photo-side {
      width: 65%;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    .photo-side img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      opacity: 0.92;
      filter: brightness(0.78) contrast(1.08);
      transform: scale(1.02);
    }

    .photo-side::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          to right,
          rgba(2, 2, 2, 0.05),
          rgba(2, 2, 2, 0.88)
        ),
        linear-gradient(
          to bottom,
          rgba(2, 2, 2, 0.1),
          rgba(2, 2, 2, 0.55)
        );
      pointer-events: none;
    }

    .info-side {
      width: 35%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 50px;
      background: #020202;
      position: relative;
      z-index: 2;
    }

    .info-box {
      width: 100%;
      max-width: 390px;
    }

    .brand {
      font-size: 40px;
      font-weight: 800;
      letter-spacing: 7px;
      margin-bottom: 14px;
      color: white;
    }

    .slogan {
      font-size: 12px;
      color: #c9a46a;
      letter-spacing: 3px;
      text-transform: uppercase;
      line-height: 1.8;
      margin-bottom: 30px;
    }

    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 34px;
    }

    .contact-info a {
      color: #d7d7d7;
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 1px;
      width: fit-content;
      border-bottom: 1px solid rgba(201, 164, 106, 0.5);
      padding-bottom: 5px;
      transition: 0.3s ease;
    }

    .contact-info a:hover {
      color: #c9a46a;
      border-color: #c9a46a;
    }

    .brand-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      margin-top: 30px;
      align-items: center;
      justify-items: center;
    }

    .brand-logo {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-logo img {
      width: auto;
      height: auto;
      max-width: 100%;
      max-height: 75px;
      object-fit: contain;
    }

    .copyright {
      position: absolute;
      bottom: 25px;
      right: 50px;
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 1px;
      z-index: 10;
    }

    @media (max-width: 850px) {
      html,
      body {
        overflow-y: auto;
      }

      .page {
        flex-direction: column;
      }

      .nav {
        top: 24px;
        right: 0;
        left: 0;
        justify-content: center;
        gap: 22px;
      }

      .nav a {
        font-size: 11px;
      }

      .photo-side {
        width: 100%;
        height: 56vh;
      }

      .photo-side::after {
        background:
          linear-gradient(
            to bottom,
            rgba(2,2,2,0.05),
            rgba(2,2,2,1)
          );
      }

      .info-side {
        width: 100%;
        height: auto;
        min-height: 44vh;
        padding: 35px 25px 90px;
        text-align: center;
      }

      .info-box {
        max-width: 390px;
      }

      .brand {
        font-size: 34px;
      }

      .contact-info {
        align-items: center;
      }

      .brand-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
      }

      .brand-logo img {
        max-height: 70px;
      }

      .copyright {
        position: fixed;
        bottom: 18px;
        right: 0;
        left: 0;
        text-align: center;
        font-size: 10px;
      }
    }
  </style>
</head>

<body>

  <nav class="nav">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>

  <main class="page">

    <section class="photo-side">
      <img src="profile.png" alt="I3XI LLC" />
    </section>

    <section class="info-side">

      <div class="info-box">

        <h1 class="brand">I3XI LLC</h1>

        <p class="slogan">
          Building Technology. Creating Experiences.
        </p>

        <div class="contact-info">
          <a href="mailto:info@I3XI.com">info@I3XI.com</a>
          <a href="tel:+14695567447">1 469 556 7447</a>
        </div>

        <div class="brand-grid">

          <div class="brand-logo">
            <img src="images/gymverge-logo.png" alt="GymVerge">
          </div>

          <div class="brand-logo">
            <img src="images/i3xi-pro-logo.png" alt="I3XI Pro">
          </div>

          <div class="brand-logo">
            <img src="images/prediiq-logo.png" alt="PredIIQ">
          </div>

          <div class="brand-logo">
            <img src="images/i3xi-studio-logo.png" alt="I3XI Studio">
          </div>

          <div class="brand-logo">
            <img src="images/commverse-logo.png" alt="CommVerse">
          </div>

          <div class="brand-logo">
            <img src="images/olu-logo.png" alt="OLU">
          </div>

        </div>

      </div>

    </section>

  </main>

  <footer class="copyright">
    © 2026 I3XI LLC. All Rights Reserved.
  </footer>

</body>
</html>
