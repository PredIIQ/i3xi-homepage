<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>I3XI</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #020202;
      color: white;
      min-height: 100vh;
      overflow: hidden;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      background: #020202;
      position: relative;
    }

    .photo-side {
      width: 68%;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    .photo-side img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      opacity: 0.92;
      filter: brightness(0.78) contrast(1.08);
    }

    .photo-side::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to right, rgba(2,2,2,0.1), rgba(2,2,2,0.85)),
        linear-gradient(to bottom, rgba(2,2,2,0.15), rgba(2,2,2,0.55));
      pointer-events: none;
    }

    .info-side {
      width: 32%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      background: #020202;
    }

    .info-box {
      width: 100%;
      max-width: 280px;
    }

    .brand {
      font-size: 38px;
      letter-spacing: 7px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .owner {
      font-size: 12px;
      color: #c9a46a;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    .details {
      display: flex;
      flex-direction: column;
      gap: 12px;
      font-size: 13px;
      letter-spacing: 1px;
    }

    .details a {
      color: #d8d8d8;
      text-decoration: none;
      width: fit-content;
      padding-bottom: 4px;
      border-bottom: 1px solid rgba(201, 164, 106, 0.55);
    }

    .details a:hover {
      color: #c9a46a;
    }

    @media (max-width: 850px) {
      body {
        overflow: auto;
      }

      .page {
        flex-direction: column;
      }

      .photo-side {
        width: 100%;
        height: 68vh;
      }

      .photo-side::after {
        background:
          linear-gradient(to bottom, rgba(2,2,2,0.05), rgba(2,2,2,1));
      }

      .info-side {
        width: 100%;
        height: auto;
        min-height: 32vh;
        padding: 30px 24px 45px;
        text-align: center;
      }

      .info-box {
        max-width: 100%;
      }

      .brand {
        font-size: 34px;
      }

      .details {
        align-items: center;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="photo-side">
      <img src="profile.png" alt="I3XI Owner" />
    </section>

    <section class="info-side">
      <div class="info-box">
        <h1 class="brand">I3XI</h1>
        <p class="owner">Owner</p>

        <div class="details">
          <a href="mailto:info@I3XI.com">info@I3XI.com</a>
          <a href="https://www.I3XI.com">www.I3XI.com</a>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
