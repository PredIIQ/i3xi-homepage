<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>I3XI</title>
  <link rel="icon" type="image/png" href="favicon.png" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #020202;
      color: white;
    }

    .page {
      width: 100%;
      height: 100vh;
      display: flex;
      position: relative;
      background: #020202;
    }

    .photo-side {
      width: 68%;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    .photo-side img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      opacity: 0.92;
      filter: brightness(0.78) contrast(1.08);
      transform: scale(1.02);
    }

    .photo-side::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to right, rgba(2,2,2,0.05), rgba(2,2,2,0.88)),
        linear-gradient(to bottom, rgba(2,2,2,0.1), rgba(2,2,2,0.55));
    }

    .info-side {
      width: 32%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 50px;
      background: #020202;
      z-index: 2;
    }

    .info-box {
      width: 100%;
      max-width: 280px;
    }

    .brand {
      font-size: 40px;
      font-weight: 800;
      letter-spacing: 8px;
      margin-bottom: 16px;
    }

    .name {
      font-size: 14px;
      letter-spacing: 1px;
      line-height: 1.7;
      margin-bottom: 12px;
    }

    .owner {
      font-size: 11px;
      color: #c9a46a;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 30px;
    }

    .details {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .details a {
      color: #d7d7d7;
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 1px;
      width: fit-content;
      border-bottom: 1px solid rgba(201,164,106,0.5);
      padding-bottom: 5px;
      transition: 0.3s ease;
    }

    .details a:hover {
      color: #c9a46a;
      border-color: #c9a46a;
    }

    .copyright {
      position: fixed;
      bottom: 18px;
      right: 30px;
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      letter-spacing: 1px;
      z-index: 5;
    }

    @media (max-width: 850px) {
      html,
      body {
        overflow-y: auto;
      }

      .page {
        flex-direction: column;
      }

      .photo-side {
        width: 100%;
        height: 68vh;
      }

      .photo-side::after {
        background: linear-gradient(to bottom, rgba(2,2,2,0.05), rgba(2,2,2,1));
      }

      .info-side {
        width: 100%;
        height: auto;
        min-height: 32vh;
        padding: 35px 25px 70px;
        text-align: center;
      }

      .info-box {
        max-width: 100%;
      }

      .brand {
        font-size: 34px;
      }

      .details {
        align-items: center;
      }

      .copyright {
        position: relative;
        bottom: auto;
        right: auto;
        text-align: center;
        padding-bottom: 20px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="photo-side">
      <img src="profile.png" alt="Tosin Peter Okunowo" />
    </section>

    <section class="info-side">
      <div class="info-box">
        <h1 class="brand">I3XI</h1>

        <p class="name">Tosin Peter Okunowo</p>

        <p class="owner">Owner</p>

        <div class="details">
          <a href="mailto:info@I3XI.com">info@I3XI.com</a>
          <a href="https://www.I3XI.com" target="_blank">www.I3XI.com</a>
          <a href="about.html">About I3XI LLC</a>
        </div>
      </div>
    </section>
  </main>

  <footer class="copyright">
    © 2026 I3XI LLC. All Rights Reserved.
  </footer>
</body>
</html>
